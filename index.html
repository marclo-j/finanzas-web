<!doctype html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HyperFinanzas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
/* ── TOKENS ── */
:root {
  --bg:        oklch(97% 0.005 250);
  --surface:   oklch(100% 0 0);
  --fg:        oklch(20% 0.02 250);
  --muted:     oklch(55% 0.015 250);
  --border:    oklch(91% 0.007 250);
  --accent:    oklch(58% 0.18 255);
  --accent-lo: oklch(94% 0.06 255);
  --green:     oklch(56% 0.16 155);
  --green-lo:  oklch(94% 0.06 155);
  --red:       oklch(57% 0.19 25);
  --red-lo:    oklch(95% 0.05 25);
  --amber:     oklch(72% 0.16 75);
  --amber-lo:  oklch(96% 0.05 75);
  --nav-w:     220px;
  --radius:    10px;
  --shadow:    0 1px 3px oklch(0% 0 0 / .07);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
}
[data-theme="dark"] {
  --bg:        oklch(17% 0.015 250);
  --surface:   oklch(23% 0.018 250);
  --fg:        oklch(92% 0.008 250);
  --muted:     oklch(62% 0.012 250);
  --border:    oklch(32% 0.018 250);
  --accent-lo: oklch(30% 0.10 255);
  --green-lo:  oklch(28% 0.08 155);
  --red-lo:    oklch(28% 0.08 25);
  --amber-lo:  oklch(30% 0.08 75);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--fg); display:flex; min-height:100vh; }

/* ── NAV LATERAL ── */
nav#sidebar {
  width:var(--nav-w); flex-shrink:0;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:20px 0;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.nav-brand {
  padding:0 20px 20px;
  border-bottom:1px solid var(--border);
  font-size:16px; font-weight:700; letter-spacing:-0.02em; color:var(--accent);
}
.nav-brand span { font-weight:400; color:var(--muted); font-size:12px; display:block; margin-top:2px; }
.nav-section { padding:16px 12px 4px; font-size:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 20px; cursor:pointer; border-radius:0;
  color:var(--muted); font-size:13px; font-weight:500;
  transition:background .15s, color .15s;
  border:none; background:none; width:100%; text-align:left;
}
.nav-item:hover { background:var(--accent-lo); color:var(--accent); }
.nav-item.active { background:var(--accent-lo); color:var(--accent); font-weight:600; }
.nav-item svg { flex-shrink:0; }

/* ── LAYOUT PRINCIPAL ── */
#app { flex:1; display:flex; flex-direction:column; min-width:0; }

/* ── TOPBAR ── */
header#topbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 28px; height:56px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:10;
}
.topbar-title { font-size:15px; font-weight:600; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.btn-icon {
  width:34px; height:34px; border-radius:8px;
  border:1px solid var(--border); background:var(--surface);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:border-color .15s, color .15s;
}
.btn-icon:hover { border-color:var(--accent); color:var(--accent); }
.avatar {
  width:32px; height:32px; border-radius:50%;
  background:var(--accent); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700;
}
.period-select {
  border:1px solid var(--border); background:var(--surface); color:var(--fg);
  border-radius:7px; padding:5px 10px; font-size:12px; cursor:pointer;
}

/* ── MAIN CONTENT ── */
main#content { padding:24px 28px; flex:1; }

/* ── KPI CARDS ── */
.kpi-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px; margin-bottom:24px;
}
.kpi-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px 20px;
  box-shadow:var(--shadow);
}
.kpi-label { font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:.07em; color:var(--muted); margin-bottom:8px; }
.kpi-value { font-size:24px; font-weight:700; letter-spacing:-0.03em;
  font-variant-numeric:tabular-nums; line-height:1; }
.kpi-delta { font-size:11px; margin-top:6px; display:flex; align-items:center; gap:4px; }
.kpi-delta.up   { color:var(--green); }
.kpi-delta.down { color:var(--red); }
.kpi-accent-bar { height:3px; border-radius:2px; margin-top:14px; }

/* ── CHARTS GRID ── */
.charts-grid {
  display:grid; grid-template-columns:1fr 340px;
  gap:14px; margin-bottom:24px;
}
.chart-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px; box-shadow:var(--shadow);
}
.chart-card-title { font-size:13px; font-weight:600; margin-bottom:16px;
  display:flex; justify-content:space-between; align-items:center; }
.chart-card-title span { font-size:11px; font-weight:400; color:var(--muted); }
.chart-wrap { position:relative; }
.chart-wrap canvas { width:100% !important; }

/* ── TABLA TRANSACCIONES ── */
.section-header {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;
}
.section-title { font-size:14px; font-weight:600; }
.btn-primary {
  background:var(--accent); color:#fff; border:none; border-radius:8px;
  padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer;
  display:flex; align-items:center; gap:6px; transition:opacity .15s;
}
.btn-primary:hover { opacity:.88; }
.table-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);
}
table { width:100%; border-collapse:collapse; }
thead { background:var(--bg); }
th { padding:10px 16px; text-align:left; font-size:11px; font-weight:600;
  text-transform:uppercase; letter-spacing:.07em; color:var(--muted);
  border-bottom:1px solid var(--border); }
td { padding:11px 16px; font-size:13px; border-bottom:1px solid var(--border);
  vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--bg); }
.badge {
  display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px;
  font-size:11px; font-weight:600; white-space:nowrap;
}
.badge-income  { background:var(--green-lo); color:var(--green); }
.badge-expense { background:var(--red-lo);   color:var(--red); }
.cat-pill {
  display:inline-flex; padding:2px 8px; border-radius:20px; font-size:11px;
  background:var(--accent-lo); color:var(--accent);
}
.amount-income  { color:var(--green); font-weight:600; font-variant-numeric:tabular-nums; }
.amount-expense { color:var(--red);   font-weight:600; font-variant-numeric:tabular-nums; }
.btn-row {
  background:none; border:none; cursor:pointer; padding:4px 6px;
  border-radius:5px; color:var(--muted); transition:color .15s, background .15s;
}
.btn-row:hover { background:var(--border); color:var(--fg); }

/* ── MODAL ── */
.modal-backdrop {
  position:fixed; inset:0; background:oklch(0% 0 0 / .45);
  display:flex; align-items:center; justify-content:center;
  z-index:100; opacity:0; pointer-events:none; transition:opacity .2s;
}
.modal-backdrop.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:28px; width:460px; max-width:95vw;
  box-shadow:0 8px 32px oklch(0% 0 0 / .18);
  transform:translateY(12px); transition:transform .2s;
}
.modal-backdrop.open .modal { transform:translateY(0); }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.modal-title { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; cursor:pointer; color:var(--muted);
  font-size:20px; line-height:1; padding:2px 6px; border-radius:6px; }
.modal-close:hover { background:var(--border); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.form-group { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
.form-group label { font-size:12px; font-weight:600; color:var(--muted); }
.form-group input, .form-group select, .form-group textarea {
  border:1px solid var(--border); border-radius:8px; padding:8px 12px;
  font-size:13px; background:var(--bg); color:var(--fg);
  transition:border-color .15s; outline:none;
}
.form-group input:focus, .form-group select:focus { border-color:var(--accent); }
.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }
.btn-ghost {
  background:none; border:1px solid var(--border); border-radius:8px;
  padding:8px 16px; font-size:13px; font-weight:500; cursor:pointer; color:var(--fg);
}
.btn-ghost:hover { background:var(--bg); }
.btn-danger { background:var(--red); color:#fff; border:none; border-radius:8px;
  padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; }
.btn-danger:hover { opacity:.88; }

/* ── RESPONSIVE ── */
@media (max-width:1024px) {
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
  .charts-grid { grid-template-columns:1fr; }
}
@media (max-width:680px) {
  nav#sidebar { display:none; }
  .kpi-grid { grid-template-columns:1fr 1fr; }
  main#content { padding:16px; }
}
</style>
</head>

<!-- NAV LATERAL -->
<nav id="sidebar">

</div>

<!-- MODAL CRUD -->
<div class="modal-backdrop" id="modal" onclick="closeModalOutside(event)">

<script>
/* ── DATOS DE EJEMPLO ── */
let txns = [
  {id:1, date:'2025-06-24', desc:'Sueldo junio',       cat:'Sueldo',          type:'ingreso', card:'BBVA Débito',      amount:28000},
  {id:2, date:'2025-06-23', desc:'Supermercado Walmart',cat:'Alimentación',    type:'egreso',  card:'BBVA Débito',      amount:1840},
  {id:3, date:'2025-06-22', desc:'Netflix',             cat:'Entretenimiento', type:'egreso',  card:'Banamex Crédito',  amount:219},
  {id:4, date:'2025-06-20', desc:'Gasolina',            cat:'Transporte',      type:'egreso',  card:'BBVA Débito',      amount:950},
  {id:5, date:'2025-06-18', desc:'Freelance diseño',    cat:'Freelance',       type:'ingreso', card:'BBVA Débito',      amount:7500},
  {id:6, date:'2025-06-17', desc:'Farmacia',            cat:'Salud',           type:'egreso',  card:'Efectivo',         amount:380},
  {id:7, date:'2025-06-15', desc:'Restaurante',         cat:'Alimentación',    type:'egreso',  card:'HSBC Crédito',     amount:620},
  {id:8, date:'2025-06-14', desc:'Intereses CETES',     cat:'Inversión',       type:'ingreso', card:'Ahorro CETES',     amount:1250},
  {id:9, date:'2025-06-12', desc:'Ropa Liverpool',      cat:'Ropa',            type:'egreso',  card:'HSBC Crédito',     amount:1400},
  {id:10,date:'2025-06-10', desc:'CFE Luz',             cat:'Servicios',       type:'egreso',  card:'BBVA Débito',      amount:480},
  {id:11,date:'2025-06-08', desc:'Uber',                cat:'Transporte',      type:'egreso',  card:'Banamex Crédito',  amount:175},
  {id:12,date:'2025-06-05', desc:'Spotify',             cat:'Entretenimiento', type:'egreso',  card:'Banamex Crédito',  amount:99},
];
let nextId = 13;
let editId = null;
let currentView = 'dashboard';

/* ── DATOS HISTÓRICOS PARA GRÁFICO ── */
const histData = {
  labels: ['Ene','Feb','Mar','Abr','May','Jun'],
  ingresos: [24000, 26500, 25000, 30000, 27500, 36750],
  egresos:  [18000, 19200, 17400, 22000, 21300, 6163],
};

/* ── KPI ── */
function calcKPIs() {
  const ing  = txns.filter(t=>t.type==='ingreso').reduce((s,t)=>s+t.amount,0);
  const egr  = txns.filter(t=>t.type==='egreso' ).reduce((s,t)=>s+t.amount,0);
  const saldo = ing - egr;
  const meta  = 10000;
  const pct   = Math.min(100, Math.round((saldo/meta)*100));
  return {ing, egr, saldo, meta, pct};
}

function fmt(n){ return new Intl.NumberFormat('es-MX',{style:'currency',currency:'PEN',minimumFractionDigits:0}).format(n); }
function fmtDate(s){ const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }

function renderKPIs(){
  const {ing,egr,saldo,pct} = calcKPIs();
  const cards = [
    {label:'Saldo disponible', value:fmt(saldo), delta:'+12.4% vs mes ant.', dir:'up',  color:'var(--accent)', bar:'var(--accent)'},
    {label:'Ingresos',          value:fmt(ing),   delta:'+8.2% vs mes ant.',  dir:'up',  color:'var(--green)',  bar:'var(--green)'},
    {label:'Egresos',           value:fmt(egr),   delta:'-3.1% vs mes ant.',  dir:'down',color:'var(--red)',    bar:'var(--red)'},
    {label:'Meta de ahorro',    value:pct+'%',    delta:fmt(saldo)+' / $10 K',dir:'up',  color:'var(--amber)',  bar:'var(--amber)'},
  ];
  document.getElementById('kpi-grid').innerHTML = cards.map(c=>`
    <div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value" style="color:${c.color}">${c.value}</div>
      <div class="kpi-delta ${c.dir}">
        ${c.dir==='up'?'▲':'▼'} ${c.delta}
      </div>
      <div class="kpi-accent-bar" style="background:${c.bar};opacity:.35"></div>
    </div>`).join('');
}

/* ── CHARTS ── */
let lineChart, donutChart;

function initCharts(){
  const isDark = document.documentElement.dataset.theme==='dark';
  const gridColor = isDark ? 'oklch(32% 0.018 250)' : 'oklch(91% 0.007 250)';
  const textColor = isDark ? 'oklch(62% 0.012 250)' : 'oklch(55% 0.015 250)';

  /* LINE */
  if(lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('lineChart'),{
    type:'line',
    data:{
      labels: histData.labels,
      datasets:[
        { label:'Ingresos', data: histData.ingresos,
          borderColor:'oklch(56% 0.16 155)', backgroundColor:'oklch(56% 0.16 155 / .12)',
          tension:.42, fill:true, pointRadius:4, pointHoverRadius:6, borderWidth:2 },
        { label:'Egresos',  data: histData.egresos,
          borderColor:'oklch(57% 0.19 25)',  backgroundColor:'oklch(57% 0.19 25 / .08)',
          tension:.42, fill:true, pointRadius:4, pointHoverRadius:6, borderWidth:2 },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:textColor, boxWidth:10, font:{size:12} } }, tooltip:{ mode:'index', intersect:false } },
      scales:{
        x:{ grid:{ color:gridColor }, ticks:{ color:textColor } },
        y:{ grid:{ color:gridColor }, ticks:{ color:textColor, callback:v=>'$'+v.toLocaleString('es-MX') } }
      }
    }
  });

  /* DONUT */
  const cats = {};
  txns.filter(t=>t.type==='egreso').forEach(t=>{ cats[t.cat]=(cats[t.cat]||0)+t.amount; });
  const labels = Object.keys(cats), data = Object.values(cats);
  const palette = ['oklch(58% 0.18 255)','oklch(56% 0.16 155)','oklch(57% 0.19 25)',
    'oklch(72% 0.16 75)','oklch(58% 0.15 300)','oklch(60% 0.14 200)','oklch(55% 0.13 30)'];
  const total = data.reduce((s,v)=>s+v,0);
  document.getElementById('donut-total').textContent = fmt(total);

  if(donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{ labels, datasets:[{ data, backgroundColor:palette, borderWidth:0, hoverOffset:6 }] },
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'70%',
      plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label: ctx=>`${ctx.label}: ${fmt(ctx.raw)}` } } }
    }
  });

  /* LEYENDA MANUAL */
  document.getElementById('donut-legend').innerHTML = labels.map((l,i)=>`
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px">
      <span style="display:flex;align-items:center;gap:7px">
        <span style="width:9px;height:9px;border-radius:50%;background:${palette[i]};flex-shrink:0"></span>
        <span style="color:var(--fg)">${l}</span>
      </span>
      <span style="font-variant-numeric:tabular-nums;color:var(--muted)">${fmt(data[i])}</span>
    </div>`).join('');
}

/* ── TABLA ── */
function txnRow(t, showEdit=true){
  return `<tr>
    <td style="color:var(--muted);font-size:12px">${fmtDate(t.date)}</td>
    <td style="font-weight:500">${t.desc}</td>
    <td><span class="cat-pill">${t.cat}</span></td>
    <td><span class="badge badge-${t.type==='ingreso'?'income':'expense'}">${t.type==='ingreso'?'Ingreso':'Egreso'}</span></td>
    <td style="color:var(--muted);font-size:12px">${t.card}</td>
    <td style="text-align:right" class="amount-${t.type==='ingreso'?'income':'expense'}">${t.type==='ingreso'?'+':'-'}${fmt(t.amount)}</td>
    <td style="text-align:right">
      ${showEdit?`<button class="btn-row" onclick="editTransaction(${t.id})" title="Editar">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="btn-row" onclick="deleteTransaction(${t.id})" title="Eliminar">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>`:''}
    </td>
  </tr>`;
}

function renderTable(){
  const q = (document.getElementById('search-input')?.value||'').toLowerCase();
  const sorted = [...txns].sort((a,b)=>b.date.localeCompare(a.date));
  const filtered = q ? sorted.filter(t=>t.desc.toLowerCase().includes(q)||t.cat.toLowerCase().includes(q)||t.card.toLowerCase().includes(q)) : sorted;

  const dashEl = document.getElementById('txn-body-dash');
  if(dashEl) dashEl.innerHTML = sorted.slice(0,6).map(t=>txnRow(t,true)).join('');

  const fullEl = document.getElementById('txn-body-full');
  if(fullEl) fullEl.innerHTML = filtered.map(t=>txnRow(t,true)).join('');
}

/* ── CRUD ── */
function openModal(id=null){
  editId = id;
  const t = id ? txns.find(x=>x.id===id) : null;
  document.getElementById('modal-title').textContent = id ? 'Editar transacción' : 'Nueva transacción';
  document.getElementById('f-desc').value   = t?.desc   || '';
  document.getElementById('f-amount').value = t?.amount || '';
  document.getElementById('f-type').value   = t?.type   || 'egreso';
  document.getElementById('f-cat').value    = t?.cat    || 'Alimentación';
  document.getElementById('f-card').value   = t?.card   || 'BBVA Débito';
  document.getElementById('f-date').value   = t?.date   || new Date().toISOString().split('T')[0];

  const footer = document.getElementById('modal-footer');
  footer.innerHTML = id
    ? `<button class="btn-danger" onclick="deleteTransaction(${id},true)">Eliminar</button>
       <div style="flex:1"></div>
       <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
       <button class="btn-primary" onclick="saveTransaction()">Guardar</button>`
    : `<button class="btn-ghost" onclick="closeModal()">Cancelar</button>
       <button class="btn-primary" onclick="saveTransaction()">Guardar</button>`;

  document.getElementById('modal').classList.add('open');
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); editId=null; }
function closeModalOutside(e){ if(e.target===document.getElementById('modal')) closeModal(); }

function saveTransaction(){
  const desc   = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  if(!desc || isNaN(amount) || amount<=0){ alert('Completa descripción y monto válido.'); return; }
  const t = {
    id: editId || nextId++,
    desc, amount,
    type : document.getElementById('f-type').value,
    cat  : document.getElementById('f-cat').value,
    card : document.getElementById('f-card').value,
    date : document.getElementById('f-date').value,
  };
  if(editId){ txns = txns.map(x=>x.id===editId?t:x); }
  else { txns.unshift(t); }
  closeModal(); refresh();
}

function editTransaction(id){ openModal(id); }

function deleteTransaction(id, fromModal=false){
  if(!confirm('¿Eliminar esta transacción?')) return;
  txns = txns.filter(t=>t.id!==id);
  if(fromModal) closeModal();
  refresh();
}

/* ── VISTAS ── */
function setView(v){
  currentView = v;
  document.getElementById('view-dashboard').style.display    = v==='dashboard'    ? '' : 'none';
  document.getElementById('view-transactions').style.display = v==='transactions' ? '' : 'none';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item')[v==='dashboard'?0:1].classList.add('active');
  document.getElementById('view-title').textContent = v==='dashboard' ? 'Resumen general' : 'Historial de transacciones';
  renderTable();
}

function changePeriod(){ /* mockup: re-render con datos actuales */ refresh(); }

/* ── DARK MODE ── */
function toggleDark(){
  const root = document.documentElement;
  const next = root.dataset.theme==='dark' ? 'light' : 'dark';
  root.dataset.theme = next;
  localStorage.setItem('hf-theme', next);
  // Actualizar ícono
  const btn = document.getElementById('dark-toggle');
  btn.innerHTML = next==='dark'
    ? `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`
    : `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  setTimeout(initCharts, 50);
}

/* ── REFRESH COMPLETO ── */
function refresh(){
  renderKPIs();
  renderTable();
  initCharts();
  persist();
}

/* ── PERSISTENCIA ── */
function persist(){ try{ localStorage.setItem('hf-txns', JSON.stringify(txns)); }catch(e){} }
function load(){
  try{
    const th = localStorage.getItem('hf-theme');
    if(th) document.documentElement.dataset.theme = th;
    const raw = localStorage.getItem('hf-txns');
    if(raw){ txns = JSON.parse(raw); nextId = Math.max(...txns.map(t=>t.id))+1; }
  }catch(e){}
}

/* ── INIT ── */
load();
refresh();
</script>
